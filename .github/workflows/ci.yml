# TAHFIDZ SaaS — CI/CD GitHub Actions
# Phase 6 : Tests + migrations + déploiement
#
# Workflow :
#   PR  → lint + type-check + tests Vitest
#   main → staging (Railway) avec migrations automatiques
#   tag v*.*.* → production (Vercel + Railway)

name: CI/CD

on:
  push:
    branches: [main, develop]
    tags:     ["v*.*.*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── Variables globales ────────────────────────────────────────────────────────
env:
  NODE_VERSION: "20"

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Lint + types ──────────────────────────────────────────────────────────
  lint:
    name: Lint & types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run type-check

  # ── 2. Tests unitaires ───────────────────────────────────────────────────────
  test:
    name: Tests Vitest
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Générer le client Prisma
        run: npx prisma generate

      - name: Vitest
        run: npm run test -- --coverage
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/tahfidz_test"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with: { token: "${{ secrets.CODECOV_TOKEN }}" }

  # ── 3. Déploiement staging ───────────────────────────────────────────────────
  deploy-staging:
    name: Staging (Railway)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://tahfidz-staging.up.railway.app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      # Migrations Prisma en staging AVANT le déploiement
      - name: Migrations Prisma staging
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      # Déploiement Railway
      - name: Deploy Railway
        uses: bervProject/railway-deploy@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service:       tahfidz-app

  # ── 4. Déploiement production ────────────────────────────────────────────────
  deploy-production:
    name: Production (Vercel + Railway)
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://tahfidz.app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      # Migrations production — Railway DB
      - name: Migrations Prisma production
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      # Next.js → Vercel
      - name: Deploy Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args:    "--prod"
